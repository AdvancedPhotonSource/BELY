{% set name = "bely-mqtt-framework" %}
{% set version = "0.1.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  path: ..

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  entry_points:
    - bely-mqtt = bely_mqtt.cli:cli

requirements:
  host:
    - python >=3.9
    - pip
    - setuptools >=65.0
    - wheel
  run:
    - python >=3.9
    - click >=8.1.0
    - paho-mqtt >=1.6.1
    - pydantic >=2.0.0
    - python-dotenv >=1.0.0
    - pluggy >=1.3.0

test:
  imports:
    - bely_mqtt
    - bely_mqtt.models
    - bely_mqtt.events
    - bely_mqtt.plugin
    - bely_mqtt.mqtt_client
  commands:
    - bely-mqtt --help
    - bely-mqtt --version
  requires:
    - pytest >=7.0.0
    - pytest-asyncio >=0.21.0

about:
  home: https://github.com/bely-org/bely-mqtt-framework
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: Pluggable Python framework for handling BELY MQTT events
  description: |
    BELY MQTT Framework is a pluggable Python framework for handling MQTT events 
    from BELY (Best Electronic Logbook Yet). It provides:
    - Pluggable handler system for MQTT topics
    - Type-safe models for BELY events
    - Integration with BELY API for additional data
    - CLI for easy configuration and management
    - Async support for high performance
  doc_url: https://github.com/bely-org/bely-mqtt-framework/tree/main/docs
  dev_url: https://github.com/bely-org/bely-mqtt-framework

extra:
  recipe-maintainers:
    - your-github-username