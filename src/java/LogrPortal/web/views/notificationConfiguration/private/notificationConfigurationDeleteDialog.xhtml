<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:ui="http://java.sun.com/jsf/facelets"
                xmlns:p="http://primefaces.org/ui">        

    <p:confirmDialog id="notificationConfigDeleteDialog"                     
                     widgetVar="notificationConfigDeleteDialogWidget"     
                     message="Destroy Configuration: #{notificationConfigurationController.current.name}?"
                     header="Destroy Configuration" 
                     styleClass="viewTransparentBackgroundDialog viewTransparentBackgroundDialog-alert">        

        <p:commandButton value="Delete"
                         action="#{notificationConfigurationController.destroy()}"
                         update="notificationConfigListDataTable"
                         oncomplete="PF('notificationConfigDeleteDialogWidget').hide()"
                         icon="fa fa-trash"
                         styleClass="ui-button-danger"
                         />
        <p:commandButton value="Cancel"
                         onclick="PF('notificationConfigDeleteDialogWidget').hide(); return false;"
                         type="button"
                         icon="fa fa-times"/>        
    </p:confirmDialog>

</ui:composition>
