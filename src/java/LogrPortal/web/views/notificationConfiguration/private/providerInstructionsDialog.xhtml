<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:ui="http://java.sun.com/jsf/facelets"
                xmlns:h="http://java.sun.com/jsf/html"
                xmlns:f="http://java.sun.com/jsf/core"
                xmlns:p="http://primefaces.org/ui">

    <h:outputStylesheet name="css/logbook.css"/>
    <h:outputScript library="javascript" name="codeBlockCopyButton.js" />

    <p:dialog id="providerInstructionsDialog"
              widgetVar="providerInstructionsDialogWidget"
              header="Provider Instructions"
              styleClass="viewTransparentBackgroundDialog"
              modal="true"
              resizable="false"
              dynamic="true"
              onShow="addCodeBlockCopyButtons(this.jq[0])"
              >

        <h:panelGroup styleClass="leftAlignedText">
            <div class="logEntry">
                <h:outputText escape="false"
                              value="#{notificationConfigurationController.selectedProviderHtmlInstructions}"/>
            </div>
        </h:panelGroup>

        <f:facet name="footer">
            <p:commandButton value="Close"
                             icon="fa fa-close"
                             onclick="PF('providerInstructionsDialogWidget').hide(); return false;"
                             type="button"/>
        </f:facet>
    </p:dialog>

</ui:composition>
