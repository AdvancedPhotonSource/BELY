<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="http://java.sun.com/jsf/html"
                xmlns:ui="http://java.sun.com/jsf/facelets"
                xmlns:p="http://primefaces.org/ui">

    <p:column sortBy="#{searchResultObject.objectName}" 
              filterBy="#{searchResultObject.objectName}"
              filterMatchMode="contains"
              headerText="Name">
        <h:outputLink value="../#{entityName}/view.xhtml?id=#{searchResultObject.objectId}&amp;breadcrumb=#{breadcrumb}" title="#{entityTitle}: #{searchResultObject.objectName}">
            <h:outputText value="#{searchResultObject.objectName}"/>
        </h:outputLink>
    </p:column>

    <ui:insert name="additionalSearchResultInformation"/>

    <p:column sortBy="#{searchResultObject.display}" headerText="Match Description">
        <ui:repeat value="#{searchResultObject.displayList}"
                   var="display">
            <h:outputText value="#{display}"/>
            <br/>
        </ui:repeat>                
    </p:column>

</ui:composition>
