<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:ui="http://java.sun.com/jsf/facelets"
                xmlns:p="http://primefaces.org/ui"
                xmlns:h="http://xmlns.jcp.org/jsf/html">

    <ui:param name="entitySettingObject" value="#{searchController.searchSettings}" />

    <p:panel header="#{itemDomainLogbookController.displayEntityTypeName}s">
        <ui:decorate template="../../item/private/itemSearchDataTable.xhtml">
            <ui:param name="itemDomainController" value="#{itemDomainLogbookController}" />

            <ui:define name="additionalSearchResultInformation">
                <ui:include src="../../itemDomainLogbook/private/additionalSearchColumnObject.xhtml" /> 
            </ui:define>
        </ui:decorate>

        <h2>Log Entries</h2>

        <p:dataTable id="#{itemDomainController.entityTypeName}LogsSearchDataTable" 
                     var="searchResultObject" 
                     value="#{itemDomainLogbookController.logResults}" 
                     sortMode="single"
                     stripedRows="true"
                     paginator="true" 
                     paginatorAlwaysVisible="false" 
                     paginatorTemplate="{CurrentPageReport} {FirstPageLink} {PreviousPageLink} {PageLinks} {NextPageLink} {LastPageLink} {RowsPerPageDropdown}"
                     currentPageReportTemplate="{startRecord}-{endRecord} of {totalRecords} records"
                     rowsPerPageTemplate="10,25,50,{ShowAll|'All'}"
                     rows="25"
                     emptyMessage="No items match.">                        

            <p:column sortBy="#{searchResultObject.objectName}" 
                      filterBy="#{searchResultObject.objectName}"
                      filterMatchMode="contains"
                      headerText="Name">
                <h:outputLink value="../itemDomainLogbook/view.xhtml?id=#{searchResultObject.objectId}&amp;logId=#{searchResultObject.additionalAttribute}&amp;breadcrumb=#{breadcrumb}" title="#{entityTitle}: #{searchResultObject.objectName}">
                    <h:outputText value="#{searchResultObject.objectName}"/>
                </h:outputLink>
            </p:column>

            <ui:include src="../../itemDomainLogbook/private/additionalSearchColumnObject.xhtml" > 
                <ui:param name="renderModifiedDate"
                          value="#{false}"/>                 
            </ui:include>

            <ui:param name="logEntry"
                      value="#{searchResultObject.additionalEntity}" /> 
            <p:column headerText="Modified On"                    
                      sortBy="#{logEntry.lastModifiedOnDateTime}" 
                      filterBy="#{logEntry.lastModifiedOnDateTime}" filterMatchMode="contains">
                <h:outputText value="#{logEntry.lastModifiedOnDateTime}"/>
            </p:column>


            <p:column sortBy="#{searchResultObject.display}" headerText="Match Description">
                <ui:repeat value="#{searchResultObject.displayList}"
                           var="display">
                    <h:outputText value="#{display}"/>
                    <br/>
                </ui:repeat>                
            </p:column>
        </p:dataTable>



        <!--        
                <ui:include src="searchResultLimitDisclaimer.xhtml" />-->
    </p:panel>


</ui:composition>
