<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:ui="http://java.sun.com/jsf/facelets"
                xmlns:p="http://primefaces.org/ui"
                xmlns:h="http://xmlns.jcp.org/jsf/html">

    <ui:param name="entitySettingObject" value="#{searchController.searchSettings}" />

    <p:panel header="#{itemDomainLogbookController.displayEntityTypeName}s">
        <ui:include src="../../item/private/itemSearchDataTable.xhtml">
            <ui:param name="itemDomainController" value="#{itemDomainLogbookController}" />
        </ui:include>

        <h2>Log Entries</h2>

        <p:dataTable id="#{itemDomainController.entityTypeName}LogsSearchDataTable" 
                     var="searchResultObject" 
                     value="#{itemDomainLogbookController.logResults}" 
                     sortMode="single"
                     stripedRows="true"
                     paginator="true" 
                     paginatorAlwaysVisible="false" 
                     rows="#{searchController.searchSettings.displayNumberOfItemsPerPage}" 
                     emptyMessage="No items match.">

            <p:column sortBy="#{searchResultObject.objectName}" 
                      filterBy="#{searchResultObject.objectName}"
                      filterMatchMode="contains"
                      headerText="Name">
                <h:outputLink value="../itemDomainLogbook/view.xhtml?id=#{searchResultObject.objectId}&amp;logId=#{searchResultObject.additionalAttribute}&amp;breadcrumb=#{breadcrumb}" title="#{entityTitle}: #{searchResultObject.objectName}">
                    <h:outputText value="#{searchResultObject.objectName}"/>
                </h:outputLink>
            </p:column>

            <p:column sortBy="#{searchResultObject.display}" headerText="Match Description">
                <h:outputText value="#{searchResultObject.display}"/>
            </p:column>

            <p:column sortBy="#{searchResultObject.objectId}" headerText="Id">
                <h:outputText value="#{searchResultObject.objectId}"/>
            </p:column>
        </p:dataTable>



        <!--        
                <ui:include src="searchResultLimitDisclaimer.xhtml" />-->
    </p:panel>


</ui:composition>
