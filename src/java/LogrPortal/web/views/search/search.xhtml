<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="http://java.sun.com/jsf/html"
                xmlns:ui="http://java.sun.com/jsf/facelets"
                xmlns:f="http://java.sun.com/jsf/core"
                xmlns:p="http://primefaces.org/ui"
                xmlns:pe="http://primefaces.org/ui/extensions">

    <f:metadata>
        <f:viewAction action="#{settingController.updateGlobalSettings()}" />
        <f:viewAction action="#{searchController.processSearchRequestParams}"/>
        <f:viewAction action="#{itemDomainLogbookController.processSearchRequestParams}"/>
        <f:viewAction action="#{searchController.processPreRender()}" />        
    </f:metadata>

    <ui:composition template="../../templates/contentViewTemplate.xhtml">
        <ui:define name="middleCenter">

            <div class="searchPage">

                <div class="pageTitle">
                    <h1>
                        BELY Search
                        <p:commandLink  id="#{entityTypeName}ViewPermanentLinkButton" 
                                        action="#{facesUtility.displayGrowlInfoMessage('Copied', 'Permalink copied to clipboard.')}" 
                                        styleClass="fa fa-link-icon fa-link"  >
                            <p:tooltip for="#{entityTypeName}ViewPermanentLinkButton" value="Copy permanent link for this search."/>
                        </p:commandLink>

                        <pe:clipboard id="viewPermanentLinkCopy" 
                                      trigger="#{entityTypeName}ViewPermanentLinkButton" 
                                      action="copy"
                                      text="#{searchController.searchPermaLink}#{itemDomainLogbookController.searchOpts}"/>
                    </h1>
                </div>


                <h:form id="searchForm">
                    <p:growl id="messages" showDetail="true">
                        <p:autoUpdate/>
                    </p:growl>

                    <ui:param name="searchSettings" value="#{searchController.searchSettings}" /> 
                    <ui:param name="advancedMode" value="#{searchSettings.advancedSearch}" /> 
                    <p:panelGrid columns="6" styleClass="editEntityDetails">
                        <h:outputLabel for="searchString" value="Search String" styleClass="entityDataLabel"/>
                        <p:outputPanel>
                            <h:inputText id="searchString" value="#{searchController.searchString}" title="Search String" styleClass="entityDataText"/>
                            <p:commandLink styleClass="pi pi-link-icon pi-question" > 
                                <p:overlayPanel for="@parent"
                                                styleClass="viewTransparentBackgroundOverlay">
                                    Search String Help
                                    <ul>
                                        <li>It is NOT case sensitive</li>
                                        <li>Wildcards such as '?' or '*' can be used</li>
                                        <ul>
                                            <li>'?' can replace a single character</li>
                                            <li>'*' can replace one or more characters</li>
                                        </ul>
                                    </ul>
                                </p:overlayPanel>
                            </p:commandLink>
                        </p:outputPanel>
                        <p:message for="searchString"/> 

                        <h:outputLabel for="advancedToggle" value="Advanced" styleClass="entityDataLabel"/>
                        <p:selectBooleanCheckbox id="advancedToggle" value="#{searchSettings.advancedSearch}" onchange="advancedToggle()"/>
                        <p:tooltip for="advancedToggle" value="Toggle advanced search mode."/> 

                        <h:outputLabel for="logbookSelection" rendered="#{advancedMode}" value="Logbook" styleClass="entityDataLabel"/>
                        <p:selectCheckboxMenu id="logbookSelection" 
                                              value="#{itemDomainLogbookController.searchLogbookTypeList}"                                                
                                              label="All" 
                                              multiple="true" 
                                              filter="true"
                                              filterMatchMode="contains"
                                              converter="entityTypeConverter"
                                              rendered="#{advancedMode}">                             
                            <f:selectItems value="#{itemDomainLogbookController.searchLogbookTypeSelectItemList}" />                             
                        </p:selectCheckboxMenu>                        
                        <p:tooltip for="logbookSelection" rendered="#{advancedMode}" value="Logbook of log document"/> 

                        <h:outputLabel for="systemSelection" rendered="#{advancedMode}" value="System" styleClass="entityDataLabel"/>
                        <p:selectCheckboxMenu id="systemSelection"
                                              value="#{itemDomainLogbookController.searchSystemList}" 
                                              multiple="true"
                                              label="All"
                                              filter="true"
                                              filterMatchMode="contains"
                                              converter="itemTypeConverter"
                                              rendered="#{advancedMode}">       
                            <f:selectItems value="#{itemDomainLogbookController.domainItemTypeList}"/> 
                        </p:selectCheckboxMenu>
                        <p:tooltip for="systemSelection" rendered="#{advancedMode}" value="System assignment to log document"/> 

                        <h:outputLabel for="usernameSelection" rendered="#{advancedMode}" value="Username" styleClass="entityDataLabel"/>
                        <p:selectCheckboxMenu id="usernameSelection" 
                                              rendered="#{advancedMode}"
                                              value="#{itemDomainLogbookController.searchUserList}"
                                              multiple="true"
                                              label="All"
                                              filter="true"
                                              filterMatchMode="contains"> 
                            <f:selectItems value="#{userInfoController.availableItems}"/>                            
                        </p:selectCheckboxMenu>
                        <p:tooltip for="usernameSelection" rendered="#{advancedMode}" value="(Optional) Search by username (created/modified/owned)."/>

                        <p:outputPanel/>
                        <p:outputPanel/>
                        <p:outputPanel/>

                        <h:outputLabel for="createdStartTime" rendered="#{advancedMode}" value="Creation Start Date" styleClass="entityDataLabel"/>
                        <p:datePicker id="createdStartTime" rendered="#{advancedMode}"
                                      value="#{itemDomainLogbookController.searchCreatedStartDate}"/>
                        <p:tooltip for="createdStartTime" rendered="#{advancedMode}" value="(Optional) Start of created date"/> 

                        <h:outputLabel for="modifiedStartTime" rendered="#{advancedMode}" value="Last Modified Start Date" styleClass="entityDataLabel"/>
                        <p:datePicker id="modifiedStartTime" rendered="#{advancedMode}"
                                      value="#{itemDomainLogbookController.searchModifiedStartDate}"/>
                        <p:tooltip for="modifiedStartTime" rendered="#{advancedMode}" value="(Optional) Start of last modified date"/> 

                        <h:outputLabel for="createdEndTime" rendered="#{advancedMode}" value="Creation End Date" styleClass="entityDataLabel"/>
                        <p:datePicker id="createdEndTime" rendered="#{advancedMode}"
                                      value="#{itemDomainLogbookController.searchCreatedEndDate}"/>
                        <p:tooltip for="createdEndTime" rendered="#{advancedMode}" value="(Optional) End of created date"/>                        

                        <h:outputLabel for="modifiedEndTime" rendered="#{advancedMode}" value="Last Modified End Date" styleClass="entityDataLabel"/>
                        <p:datePicker id="modifiedEndTime" rendered="#{advancedMode}"
                                      value="#{itemDomainLogbookController.searchModifiedEndDate}"/>
                        <p:tooltip for="modifiedEndTime" rendered="#{advancedMode}" value="(Optional) End of last modified date"/> 

                        <!--                        <h:outputLabel for="searchCustomizeButton" value="Search Options" styleClass="entityDataLabel"/>
                                                <p:commandButton id="searchCustomizeButton" 
                                                                 oncomplete="PF('searchCustomizeDialogWidget').show()" 
                                                                 alt="Customize Search" 
                                                                 styleClass="actionButtonLeft" 
                                                                 update="@form" 
                                                                 icon="fa fa-wrench">
                                                    <p:tooltip for="searchCustomizeButton" value="Customize search."/>
                                                </p:commandButton>
                                                <p:message for="searchCustomizeButton"/> -->

                    </p:panelGrid>

                    <p:remoteCommand name="advancedToggle"
                                     onstart="PF('loadingDialog').show()"
                                     oncomplete="PF('loadingDialog').hide()"                                     
                                     update="@form"/> 

                    <p/>
                    <div class="actionButton">
                        <p:commandButton id="searchButton" onclick="prepareSearch()"  value="Search" alt="Search" icon="fa fa-search"/>
                        <p:defaultCommand target="searchButton"/>

                        <p:remoteCommand name="prepareSearch"
                                         autoRun="#{searchController.performExternallyInitializedSearch}"
                                         update="@form"
                                         action="#{searchController.prepareSearch()}"
                                         oncomplete="performSearch()" />

                        <p:remoteCommand name="performSearch"                                         
                                         update="@form"
                                         action="#{searchController.search()}"
                                         oncomplete="completeSearch()" />

                        <p:remoteCommand name="completeSearch"
                                         action="#{searchController.completeSearch()}" />
                    </div>


                    <ui:fragment>
                        <ui:include src="private/searchRegisterSearchableController.xhtml" />
                    </ui:fragment>

                    <p/>

                    <ui:fragment rendered="#{searchController.displayResults}">
                        <div class="sectionTitle">
                            <h2>Search Results</h2>
                        </div>  

                        <ui:include src="private/searchEntityResultPanels.xhtml" />

                    </ui:fragment>

                    <ui:fragment rendered="#{searchController.displayLoadingScreen}">
                        <div class="sectionTitle">
                            <h2>Loading Search Results</h2>
                        </div>  
                        <p/>
                        <p:graphicImage library="images" name="ajax-loader.gif" />
                    </ui:fragment>

                    <ui:include src="private/searchCustomizeDialog.xhtml"/>

                </h:form>
            </div>


        </ui:define>
    </ui:composition>
</ui:composition>
