<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:f="http://java.sun.com/jsf/core"
                xmlns:ui="http://java.sun.com/jsf/facelets"
                xmlns:p="http://primefaces.org/ui"
                template="../item/private/templates/itemViewTemplate.xhtml"
                xmlns:h="http://xmlns.jcp.org/jsf/html">

    <ui:param name="entityController" value="#{itemDomainLogbookController}" />        

    <f:metadata>
        <f:viewAction action="#{settingController.updateGlobalSettings()}" />
        <f:viewAction action="#{itemDomainLogbookController.processViewRequestParams}"/>
        <f:viewAction action="#{propertyValueController.processPreRender()}"/>
        <f:viewAction action="#{logController.processPreRender()}"/>
        <f:viewAction action="#{itemElementController.processPreRender()}"/>
        <f:viewAction action="#{itemMemberViewController.processPreRender()}" />
    </f:metadata>

    <ui:define name="itemGalleryPanel" /> 
    <ui:define name="itemLogListPanel" /> 
    <ui:define name="itemPropertyListPanel" /> 
    <ui:define name="itemElementListPanel" />      

    <ui:define name="leftItemContent"/>


    <ui:define name="additionalLeftItemPanels">

    </ui:define>

    <ui:define name="additionalTopRightItemPanels">                       
        <p:commandButton id="showDetailsButton" icon="fa fa-info" style="float: right">       
            <p:tooltip for="showDetailsButton"
                       value="Log Document Info" /> 
        </p:commandButton>
        <p:overlayPanel for="showDetailsButton"
                        showCloseIcon="true"
                        dismissable="false">      

            <ui:decorate template="../item/private/templates/itemViewPanelGridTemplate.xhtml">
                <ui:define name="additionalItemInformation">        
                    <ui:include src="private/templateLogModePanelGridObject.xhtml" />
                    <ui:include src="private/showTimestampSettingGridObject.xhtml" />
                    <ui:include src="private/documentLockoutTimePanelGridObject.xhtml" />
                    <ui:include src="private/logLockoutTimePanelGridObject.xhtml" />
                    <ui:include src="private/defaultTypePanelGridObject.xhtml" />                    

                    <h:outputLabel for="parentName#{viewName}" value="Parent Item" 
                                   styleClass="entityDataEmphasizedLabel"/>

                    <ui:fragment>

                        <ui:param name="parentItem"
                                  value="#{itemDomainLogbookController.getParentItem(itemObject)}" /> 
                        <ui:param name="displayString"
                                  value="#{displayString != null 
                                           ? displayString 
                                           : parentItem.name}" />
                        <h:outputLink value="../item/view.xhtml?id=#{parentItem.id}" 
                                      styleClass="#{styleClass}"
                                      rendered="#{parentItem != null}"
                                      title="View #{entityTypeName} details"> 
                            <h:outputText value="#{displayString}"/>
                        </h:outputLink>
                        <h:outputText rendered="#{parentItem == null}"
                                      value="Top level"/>
                    </ui:fragment>

                </ui:define>                
            </ui:decorate>

            <p/>
            <p/>

            <ui:insert name="domainEntityInfoViewDialog"/>
            <ui:insert name="commonViewActionButtons"/>                        

            <p:panel header="Properties"
                     id="#{entityTypeName}ViewPropertiesPanel"
                     rendered="#{entityController.entityDisplayItemProperties}"
                     toggleable="true" 
                     collapsed="#{false}">
                <ui:insert name="itemProperties"/>
            </p:panel>
            <p:panel header="#{currentItemController.itemElementsListTitle}"
                     id="#{entityTypeName}ViewElementsPanel"
                     rendered="#{entityController.renderItemElementList}"
                     toggleable="true" 
                     collapsed="#{false}">
                <p:commandButton icon="fa fa-plus"
                                 value="Add"
                                 rendered="#{isEntityWriteable}"
                                 onclick="prepareCreateLogbookSection()"/>


                <p:dataTable value="#{itemObject.itemElementDisplayList}"
                             var="itemElementObject">
                    <p:column headerText="Name">
                        #{itemElementObject.containedItem.name}
                    </p:column>
                </p:dataTable>
            </p:panel>
        </p:overlayPanel>

        <ui:fragment rendered="#{!itemObject.documentWriteableByTimeout}">
            <span class="lockedDocumentMessage">Document locked by lockout time</span>
        </ui:fragment>
        
        <p:commandButton id="backDocumentList" icon="fa fa-arrow-up" ajax="false"
                action="#{itemDomainLogbookController.navigateToLogDocumentList}">
        <p:tooltip for="backDocumentList" value="Navigate to Log Document List" />
        </p:commandButton>
        
        <p:commandButton id="prevDoc" icon="fa fa-arrow-left" ajax="false" disabled="#{itemDomainLogbookController.prevPageButtonDisabled}"
                action="#{itemDomainLogbookController.navigateToPrevDoc}">
            <p:tooltip for="prevDoc" value="Navigate to previous log document" /> 
        </p:commandButton>

        <p:commandButton id="nextDoc" icon="fa fa-arrow-right" ajax="false" disabled="#{itemDomainLogbookController.nextPageButtonDisabled}"
                action="#{itemDomainLogbookController.navigateToNextDoc}">
            <p:tooltip for="nextDoc" value="Navigate to next log document" /> 
        </p:commandButton>       

        <p:commandButton id="toggleTimestamp" icon="fa fa-clock-o"
                         style="float: right"
                         ajax="true"                        
                         onclick="toggleTimestamps()">
            <p:tooltip for="toggleTimestamp" value="Click to show/hide the timestamp on each log entry." /> 
        </p:commandButton>
        
        <p:selectBooleanButton value="#{itemDomainLogbookController.reversedLogs}" 
                               style="float: right"
                               onIcon="pi pi-sort-amount-up"
                               offIcon="pi pi-sort-amount-down" 
                               onchange="reversedLogsToggled()"> 
            <p:tooltip for="@parent"> 
                Toggle log order, oldest -> newest (default, off) and newest -> oldest.
            </p:tooltip>
            
            <p:remoteCommand name="reversedLogsToggled"
                             update="@this"
                             action="#{itemDomainLogbookController.viewForCurrentEntity()}"/>
        </p:selectBooleanButton>

        <p:panel header="Log Entries" 
                 id="#{entityTypeName}ViewLogEntriesPanel"
                 rendered="#{entityController.entityDisplayItemLogs and false}"
                 toggleable="true" >
            <ui:insert name="itemLogs" />
        </p:panel>


        <ui:fragment rendered="#{itemObject.itemElementDisplayList.size() == 0}">
            <ui:include src="private/logbookViewObject.xhtml"/> 
        </ui:fragment>

        <ui:fragment rendered="#{itemObject.itemElementDisplayList.size() > 0}">
            <h1>#{itemObject.name}</h1>
            <ui:repeat value="#{itemObject.logbookSections}" var="logbookSection">               
                <ui:include src="private/logbookViewObject.xhtml">
                    <ui:param name="itemObject"
                              value="#{logbookSection}" /> 
                </ui:include>
            </ui:repeat>            
        </ui:fragment>


    </ui:define>


    <ui:define name="additionalViewItemContent">
        <ui:insert name="itemDestroyDialog"/>
        <ui:insert name="itemPropertiesSupport" />
        <ui:include src="private/addLogbookSectionDialog.xhtml" /> 
        <ui:include src="private/addLogbookEntryDialog.xhtml" />   
        <ui:include src="private/markdownExampleDialog.xhtml" />        
        
        <h:outputScript library="javascript" name="logDocumentView.js?v=1"  />
        
        <p:remoteCommand autoRun="true"
                         oncomplete="renderLogs(); ScrollToLog(#{itemDomainLogbookController.lastLog.id});" /> 
    </ui:define>


</ui:composition>
