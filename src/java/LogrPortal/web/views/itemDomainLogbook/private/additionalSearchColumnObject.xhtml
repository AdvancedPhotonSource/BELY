<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:ui="http://java.sun.com/jsf/facelets"
                xmlns:p="http://primefaces.org/ui"
                xmlns:h="http://xmlns.jcp.org/jsf/html">

    <ui:param name="item" value="#{searchResultObject.cdbEntity}" /> 
    <ui:param name="entityInfo" value="#{item.entityInfo}" />
    <ui:param name="renderModifiedDate" value="#{renderModifiedDate != null ? renderModifiedDate : true}"/> 

    <p:column headerText="Logbook" 
              sortBy="#{item.longEntityTypeString}"
              filterBy="#{item.longEntityTypeString}" filterMatchMode="contains">        
        #{item.longEntityTypeString}
    </p:column>            
    
    <p:column headerText="System" 
              sortBy="#{item.itemTypeString}"
              filterBy="#{item.itemTypeString}" filterMatchMode="contains">        
        #{item.itemTypeString}
    </p:column>            

    <p:column headerText="Modified On"
              rendered="#{renderModifiedDate}"
              sortBy="#{entityInfo.lastModifiedOnDateTime}" 
              filterBy="#{entityInfo.lastModifiedOnDateTime}" filterMatchMode="contains">
        <h:outputText value="#{entityInfo.lastModifiedOnDateTime}"/>
    </p:column>


</ui:composition>
