<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:ui="http://java.sun.com/jsf/facelets"
                xmlns:p="http://primefaces.org/ui"                
                xmlns:f="http://xmlns.jcp.org/jsf/core"
                xmlns:h="http://xmlns.jcp.org/jsf/html">

    <h2>#{itemObject.name}</h2>  

    <div class="logbookSection">

        <ui:fragment rendered="#{itemObject.logList.size() ==0}">          
            <div class="logEntry">
                Click the plus button to create a first log entry.            
            </div>
        </ui:fragment>


        <ui:fragment rendered="#{itemObject.logList.size() !=0}">
            <p:dataScroller value="#{itemObject.logList}" var="logObject" styleClass="logDataScroller">                
                <ui:decorate template="templates/logEntryObjectTemplate.xhtml">
                    <ui:define name="additionalLogEntryFooter">
                        <p:commandLink styleClass="logAction-left fa fa-link-icon fa-mail-reply"
                                       onclick="PF('loadingDialog').show()"
                                       rendered="#{isEntityWriteable}"
                                       action="#{itemDomainLogbookController.prepareAddLogReply(logObject)}"
                                       update="@form:#{entityTypeName}LogbookLogAddDialog"
                                       oncomplete="PF('loadingDialog').hide(); 
                                       PF('#{entityTypeName}LogbookLogAddDialogWidget').show()">
                            <p:tooltip for="@parent">Reply</p:tooltip>
                        </p:commandLink>
                                                 
                        <p:commandLink styleClass="logAction-left fa fa-link-icon fa-chevron-up"
                                       onclick="handleToggleRepliesButton(this, '#{logObject.id}logEntryRepliesWidget');"
                                       rendered="#{logObject.childLogList.size() > 0}">
                            <p:tooltip for="@parent">Toggle Replies</p:tooltip>
                        </p:commandLink>
                    </ui:define>

                    <ui:define name="additionalLogEntryContent"> 
                        <ui:param name="hasReplies"
                                  value="#{logObject.childLogList.size() > 0}"/>

                        <p:panel widgetVar="#{logObject.id}logEntryRepliesWidget"
                                 toggleable="true"                
                                 rendered="#{hasReplies}">
                            <p:dataScroller value="#{logObject.childLogList}" var="childLog" styleClass="logDataScroller">
                                <ui:decorate template="templates/logEntryObjectTemplate.xhtml">
                                    <ui:param name="logObject" value="#{childLog}"/> 
                                    <ui:define name="additionalLogEntryFooter"/>
                                    <ui:define name="additionalLogEntryContent"/> 
                                </ui:decorate>
                            </p:dataScroller>
                        </p:panel>



                    </ui:define>
                </ui:decorate>         
            </p:dataScroller>
        </ui:fragment>
    </div>        

    <p:commandButton icon="fa fa-plus"
                     value="Add Log Entry"
                     rendered="#{isEntityWriteable}"
                     onclick="PF('loadingDialog').show()"
                     action="#{itemDomainLogbookController.prepareAddLog(itemObject)}"
                     update="@form:#{entityTypeName}LogbookLogAddDialog"
                     oncomplete="PF('loadingDialog').hide(); 
                     PF('#{entityTypeName}LogbookLogAddDialogWidget').show()"/>



</ui:composition>
