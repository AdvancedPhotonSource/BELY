<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:ui="http://java.sun.com/jsf/facelets"
                xmlns:p="http://primefaces.org/ui"
                xmlns:pe="http://primefaces.org/ui/extensions"
                xmlns:h="http://xmlns.jcp.org/jsf/html"
                xmlns:f="http://xmlns.jcp.org/jsf/core"> 

    <ui:param name="logModified" value="#{logObject.modifiedEntry}"/>                
    <div id="log-#{logObject.id}">                   
        <p:panel collapsed="#{!itemDomainLogbookController.logbookDisplayTimestamps}"
                 styleClass="logTimestamp"
                 toggleable="true"
                 toggleSpeed="100"
                 id="timestampPanel"
                 widgetVar="timestampPanelWidget#{logObject.id}">                        

            <span>
                Added on 
                <h:outputText value="#{logObject.enteredOnDateTime}">
                    <f:convertDateTime pattern="MM/dd/yyyy hh:mm a"/>
                </h:outputText>
                by 
                #{logObject.enteredByUser}
            </span>
            <ui:fragment rendered="#{logModified}">
                <span style="float: right">
                    Edited on
                    <h:outputText value="#{logObject.lastModifiedOnDateTime}">
                        <f:convertDateTime pattern="MM/dd/yyyy hh:mm a"/>
                    </h:outputText>
                    by
                    #{logObject.lastModifiedByUser}
                </span>
            </ui:fragment>                        
        </p:panel>

        <p:outputPanel styleClass="logEntry">                        
            <h:outputText escape="false" value="#{logObject.htmlText}"/>
        </p:outputPanel>

        <p:outputPanel rendered="#{logObject.attachmentList.size() > 0 and false}"
                       styleClass="logAttachment">
            <p:galleria value="#{logObject.attachmentList}"
                        var="attachment"
                        showThumbnails="false" 
                        showCaption="true"
                        showIndicators="true"
                        showIndicatorsOnItem="true"
                        style="max-width: 500px;">
                <p:graphicImage value="#{attachment.galleryFilePath}" title="#{attachment.displayName}"
                                style="width: 100%; display: block;"
                                onclick="window.open('#{attachment.filePath}')"/>  
                <f:facet name="footer"> 
                </f:facet>
            </p:galleria>
        </p:outputPanel>
        <div class="logFooter">                                                                        
            <p:commandLink styleClass="logAction-left fa fa-link-icon fa-pencil logEditButton"
                           onclick="PF('loadingDialog').show()"
                           rendered="#{isEntityWriteable}"
                           action="#{itemDomainLogbookController.prepareEditLogEntry(logObject)}"
                           update="@form:#{entityTypeName}LogbookLogAddDialog"
                           oncomplete="PF('loadingDialog').hide(); 
                           PF('#{entityTypeName}LogbookLogAddDialogWidget').show()"> 
                <p:tooltip for="@parent"> 
                    Edit log entry. <br/>
                    Tip: Double clicking the log entry will also start log edit. 
                </p:tooltip>
            </p:commandLink>

            <p:commandLink id="logReactionCommandLink"
                           styleClass="logAction-left fa fa-link-icon fa-smile-o logEditButton"
                           value=" #{itemDomainLogbookController.getAddedReactionsString(logObject)}"   
                           update="@form:#{entityTypeName}LogbookLogAddDialog"
                           oncomplete="PF('loadingDialog').hide();"> 
                <p:tooltip for="@parent"> 
                    React
                </p:tooltip>                
            </p:commandLink>

            <p:overlayPanel for="logReactionCommandLink" dynamic="true">
                <ui:param name="groupReactionList"
                          value="#{itemDomainLogbookController.getGroupedReactions(logObject)}"/>                     
                <p:dataScroller value="#{groupReactionList}"
                                var="groupedReaction"> 
                    <ui:param name="reaction"
                              value="#{groupedReaction.reaction}"/>                         
                    <ui:param name="reactionLabel"
                              value="#{reaction.emoji} - #{groupedReaction.reactionCount}"/> 

                    <ui:param name="remoteCommandActionName"
                              value="reactionAction#{logObject.id}#{reaction.id}" />                                                 

                    <p:selectBooleanButton value="#{groupedReaction.userReaction}"
                                           onLabel="#{reactionLabel}"     
                                           offLabel="#{reactionLabel}"
                                           onchange="#{remoteCommandActionName}()"
                                           disabled="#{!isEntityWriteable}">
                        <p:tooltip for="@parent"
                                   rendered="#{groupedReaction.reactionCount > 0}">
                            Reaction(s) by: <br/>
                            <ui:repeat value="#{groupedReaction.logReactionList}"
                                       var="lr">
                                #{lr.userInfo} <br/>                                
                            </ui:repeat>
                        </p:tooltip>
                    </p:selectBooleanButton>

                    <p:remoteCommand name="#{remoteCommandActionName}"
                                     action="#{itemDomainLogbookController.toggleReaction(logObject, reaction)}"
                                     update="@form"/>
                </p:dataScroller>
            </p:overlayPanel>

            <p:commandLink id="#{entityTypeName}LogDestroyButton"
                           rendered="#{isEntityWriteable}"
                           styleClass="logAction-right fa fa-link-icon fa-trash" title="Delete"
                           onstart="PF('confirmDeleteLog#{logObject.viewUUID}Widget').show();">
                <p:tooltip for="#{entityTypeName}LogDestroyButton" value="Delete #{entityTypeName} log entry."/>
            </p:commandLink>

            <p:commandLink id="#{entityTypeName}LogPermalink"
                           action="#{facesUtility.displayGrowlInfoMessage('Copied', 'Log permalink copied to clipboard.')}"                                        
                           styleClass="logAction-right fa fa-link-icon fa-clipboard" title="Copy permalink">                                    
                <p:tooltip for="#{entityTypeName}LogPermalink" value="Copy permalink to log entry."/>
                <pe:clipboard id="viewPermanentLinkCopy" 
                              trigger="@parent"                   
                              action="copy"
                              text="#{itemDomainLogbookController.getLogPermalink(logObject.id)}"/>
            </p:commandLink>

            <p:confirmDialog message="Would you like to remove the log?"
                             header="Confirm Log Delete" 
                             severity="alert"
                             styleClass="viewTransparentBackgroundDialog viewTransparentBackgroundDialog-alert"
                             widgetVar="confirmDeleteLog#{logObject.viewUUID}Widget">
                <p:commandButton value="Yes" 
                                 id="confirmYesDestroyLogEntryButton"
                                 action="#{entityController.viewForCurrentEntity()}" 
                                 actionListener="#{itemDomainLogbookController.destroyLogEntry(logObject)}"
                                 onstart="PF('confirmDeleteLog#{logObject.viewUUID}Widget').hide()"/>
                <p:commandButton value="No" onclick="PF('confirmDeleteLog#{logObject.viewUUID}Widget').hide();" type="button" />
            </p:confirmDialog>
            <ui:insert name="additionalLogEntryFooter" />             
        </div>

        <ui:insert name="additionalLogEntryContent" /> 
    </div>

</ui:composition>
