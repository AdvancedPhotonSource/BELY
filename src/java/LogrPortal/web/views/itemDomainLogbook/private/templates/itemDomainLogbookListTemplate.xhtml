<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:ui="http://java.sun.com/jsf/facelets"
                template="../../../item/private/templates/itemListTemplate.xhtml"
                xmlns:p="http://primefaces.org/ui"
                xmlns:pe="http://primefaces.org/ui/extensions"> 

    <ui:param name="listExportable"
              value="#{false}"/>

    <ui:define name="thumbnail">

    </ui:define>

    <ui:define name="actionsColumn">

    </ui:define>

    <ui:define name="pageHeaderTitle">
        #{entityController.itemListPageTitle}

        <p:commandLink  id="#{entityTypeName}ViewPermanentLinkButton" 
                         action="#{facesUtility.displayGrowlInfoMessage('Copied', 'Permalink copied to clipboard.')}" 
                         styleClass="fa fa-link-icon fa-link"  >
            <p:tooltip for="#{entityTypeName}ViewPermanentLinkButton" value="Copy permanent link for this log document list."/>
        </p:commandLink>

        <pe:clipboard id="viewPermanentLinkCopy" 
                      trigger="#{entityTypeName}ViewPermanentLinkButton" 
                      action="copy"
                      text="#{entityController.currentListPermalink}"/>

    </ui:define>

</ui:composition>
