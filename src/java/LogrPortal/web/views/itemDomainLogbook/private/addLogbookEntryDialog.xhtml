<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:ui="http://java.sun.com/jsf/facelets"
                xmlns:p="http://primefaces.org/ui"
                xmlns:f="http://xmlns.jcp.org/jsf/core"
                xmlns:h="http://xmlns.jcp.org/jsf/html">

    <p:dialog id="#{entityTypeName}LogbookLogAddDialog"
              widgetVar="#{entityTypeName}LogbookLogAddDialogWidget" 
              header="Add Log Entry" 
              styleClass="viewTransparentBackgroundDialog"
              closable="false"
              modal="true">

        <p:outputPanel id="#{entityTypeName}LogbookLogAddDialogContents">

            <ui:param name="logObject" value="#{entityController.newLogEdit}" />
            <ui:param name="saveConflict" value="#{logObject.saveConflict}"/> 

            <p:panelGrid id="logEntryPanelGrid" columns="2" rendered="#{logObject != null}" >

                <h:outputText value="Latest Saved Log Entry" rendered="#{saveConflict}"/> 

                <h:outputLabel for="logbookLogEntryValue" value="Log Entry" styleClass="entityDataEmphasizedLabel"/>                        

                <h:inputTextarea styleClass="logEntryDialogEntryValue"
                                 readonly="true"
                                 disabled="true"
                                 rendered="#{saveConflict}"
                                 value="#{logObject.originalLogEntryText}"                             
                                 onblur="logbookLogEntryValueBlur()"/> 

                <h:inputTextarea styleClass="logEntryDialogEntryValue" 
                                 id="logbookLogEntryValue"                              
                                 value="#{logObject.text}"                             
                                 onblur="logbookLogEntryValueBlur()"/>                         

                <p:column/> 
                <p:column>
                    <p:commandLink value="Markdown Help" onclick="PF('markdownExampleDialogWidget').show()" /> 
                </p:column>                               

                <p:column rendered="#{saveConflict}"/>                 
                <h:outputLabel for="logbookLogAttachmentsValue" value="Attachments" styleClass="entityDataEmphasizedLabel"/>            
                
                <p:column rendered="#{saveConflict}"/> 
                <p:outputPanel id="logbookLogAttachmentsValue">
                    <ui:include src="../../log/private/logAttachmentFileUpload.xhtml">
                        <ui:param name="updateTarget" value="logEntryPanelGrid" />
                    </ui:include>
                    <p:remoteCommand autoRun="true"
                                     action="#{logAttachmentUploadBean.setLogEntry(logObject)}"/>
                    <p:outputPanel id="logattachementsValueList">
                        <ui:repeat var="attachment" value="#{logObject.attachmentList}">
                            <h:outputLink value="#{attachment.filePath}" target="_page_#{attachment.name}" title="#{attachment.name}" styleClass="entityDataIcon">
                                <h:graphicImage alt="Attachment" library="images" name="attachment.ico"/>
                            </h:outputLink>   
                        </ui:repeat>

                        <p:tooltip for="logbookLogAttachmentsValue" value="Files/Screenshots can also be pasted directly into the log entry text." /> 
                    </p:outputPanel>
                </p:outputPanel>


            </p:panelGrid>

            <p:outputPanel style="display: none">
                <p:remoteCommand name="completePastedImage"
                                 onstart="PF('loadingDialog').show();"
                                 process="@this"
                                 update="lastFileReference"
                                 oncomplete="PF('loadingDialog').hide(); pasteLatestFileReference();" /> 

                <p:fileUpload listener="#{logAttachmentUploadBean.handleFileUploadWithLastFileReference}"       
                              id="logEntryClipboardAttachmentFileUpload"
                              widgetVar="logEntryClipboardAttachmentFileUploadWidget"    
                              oncomplete="completePastedImage()"                              
                              mode="simple"
                              auto="true"
                              fileLimit="1"                              
                              fileLimitMessage="Only one attachment can be added per upload."/>

                <h:outputText id="lastFileReference" value="#{logAttachmentUploadBean.lastFileReference}" /> 
            </p:outputPanel>

            <p:remoteCommand name="logbookLogEntryValueBlur" 
                             update="logbookLogEntryValue"/> 

        </p:outputPanel>

        <f:facet name="footer" class="dialog">
            <p:outputPanel rendered="#{logObject != null}">
                <p:commandButton value="Save" alt="Save" 
                                 id="#{entityTypeName}SaveLogbookLogButton"
                                 onclick="PF('loadingDialog').show()"
                                 update="#{entityTypeName}LogbookLogAddDialogContents"
                                 action="#{entityController.saveLogList()}"
                                 oncomplete="failSaveLogEntry();"
                                 icon="fa fa-save"/>

                <p:commandButton value="Close" 
                                 icon="fa fa-close"
                                 oncomplete="PF('#{entityTypeName}LogAddDialogWidget').hide()"
                                 action="#{entityController.viewForCurrentEntity()}"
                                 update="@form"/>
                
                <p:remoteCommand name="failSaveLogEntry"
                                 oncomplete="PF('#{entityTypeName}LogbookLogAddDialogWidget').initPosition();  PF('loadingDialog').hide();"/>
            </p:outputPanel>
        </f:facet>

    </p:dialog>



</ui:composition>
