<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:ui="http://java.sun.com/jsf/facelets"                
                xmlns:p="http://primefaces.org/ui"
                xmlns:f="http://xmlns.jcp.org/jsf/core"
                xmlns:h="http://xmlns.jcp.org/jsf/html"> 


    <f:selectItems value="#{itemDomainLogbookController.logbookHomeTypeCandidateList}"
                   var="et"
                   itemLabel="#{et.availableLongDisplayName}"/> 

    <ui:param name="parentType" value="#{type.parentEntityType}" /> 

    <p:column>
        <ui:fragment rendered="#{parentType != null}">
            <p:outputLabel value="#{parentType.availableLongDisplayName}"
                           style="font-weight: bold;"/>

            <br/>
            <p:outputLabel value="#{type.availableLongDisplayName}"
                           style="margin-left: 1em"/> 
        </ui:fragment>

        <ui:fragment rendered="#{parentType == null}">
            <p:outputLabel value="#{type.availableLongDisplayName}"
                           style="font-weight: bold;"/>
        </ui:fragment>            
    </p:column>

</ui:composition>
