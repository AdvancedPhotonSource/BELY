<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:ui="http://java.sun.com/jsf/facelets"
                xmlns:p="http://primefaces.org/ui"
                xmlns:h="http://xmlns.jcp.org/jsf/html"
                xmlns:f="http://xmlns.jcp.org/jsf/core">         


    <p:dialog id="entityTypeInfoDialog"
              widgetVar="entityTypeInfoDialogWidget"
              header="Entity Type Details"
              styleClass="viewTransparentBackgroundDialog"
              modal="True">
        <p:outputPanel id="entityTypeInfoPanel">
            <ui:param name="entityType" value="#{entityTypeController.selectedEntityType.data}"/>

            <p:panelGrid  columns="2" columnClasses="label,value" rendered="#{entityTypeController.selectedEntityType != null}">
                <h:outputLabel for="id" value="Id" />
                <h:outputText id="id" value="#{entityType.id}"/>
                
                <h:outputLabel for="name" value="Name" />
                <h:outputText id="name" value="#{entityType.name}"/>

                <h:outputLabel for="displayName" value="Display Name" />
                <h:outputText id="displayName" value="#{entityType.displayName}"/>
                
                <h:outputLabel for="longDisplayName" value="Long Display Name" />
                <h:outputText id="longDisplayName" value="#{entityType.longDisplayName}"/>

                <h:outputLabel for="description" value="Description" />
                <h:outputText id="description" value="#{entityType.description}"/>                            

                <h:outputLabel for="customListUrl" value="Custom List" />
                <h:outputText id="customListUrl" value="#{entityType.customListUrl}"/>

                <h:outputLabel for="templateItem" value="Template Item" />
                <h:outputText id="templateItem" value="#{entityType.primaryTemplateItem.name}"/>                             
            </p:panelGrid>

        </p:outputPanel>


        <f:facet name="footer">
            <p:commandButton value="close"
                             icon="fa fa-close"
                             onclick="PF('entityTypeInfoDialogWidget').hide()" />
        </f:facet>                                        
    </p:dialog>


</ui:composition>
