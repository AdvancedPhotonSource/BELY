<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:ui="http://java.sun.com/jsf/facelets"
                xmlns:p="http://primefaces.org/ui"
                xmlns:f="http://xmlns.jcp.org/jsf/core"
                xmlns:h="http://xmlns.jcp.org/jsf/html">         


    <p:dialog id="entityTypeCreateDialog"
              widgetVar="entityTypeCreateDialogWidget"
              header="Create Entity Type"
              styleClass="viewTransparentBackgroundDialog"
              closable="false"
              modal="true">
        <p:outputPanel id="entityTypeCreatePanel">    
            <p:outputPanel rendered="#{entityTypeController.renderCreateDialog}">
                <ui:decorate template="entityTypeEditPanelGrid.xhtml" > 
                    <ui:param name="viewName"
                              value="Create" />                
                    <ui:param name="entityType" 
                              value="#{entityTypeController.current}"/>

                    <ui:param name="nameEditable"
                              value="#{true}" />

                    <ui:define name="additionalPanelGridItems">
                        <h:outputLabel for="parent#{viewName}" value="Parent" />
                        <h:outputText id="parent#{viewName}" value="#{entityType.parentEntityType.displayName}"/>
                    </ui:define>                
                </ui:decorate>
            </p:outputPanel>
        </p:outputPanel>


        <f:facet name="footer">
            <p:commandButton value="save"
                             icon="pi pi-save"
                             update="entityTypeCreatePanel"
                             action="#{entityTypeController.createEntityType()}"/>

            <p:commandButton value="Close"
                             icon="pi pi-times"      
                             immediate="true"                             
                             action="#{entityTypeController.list()}" />
        </f:facet>                                        
    </p:dialog>


</ui:composition>
