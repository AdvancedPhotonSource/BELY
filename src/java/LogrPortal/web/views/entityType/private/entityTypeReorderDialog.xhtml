<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:ui="http://java.sun.com/jsf/facelets"
                xmlns:p="http://primefaces.org/ui"
                xmlns:f="http://xmlns.jcp.org/jsf/core">         


    <p:dialog id="entityTypeReorderDialog"
              widgetVar="entityTypeReorderDialogWidget"
              header="Reorder Entity Type"
              styleClass="viewTransparentBackgroundDialog"
              closable="false"
              modal="true">
        <p:outputPanel id="entityTypeReorderPanel">            
            <p:outputPanel rendered="#{entityTypeController.sortableEntityTypeList != null}">
                <p:dataTable value="#{entityTypeController.sortableEntityTypeList}"
                             var="entityType"
                             draggableRows="true">
                 
                    <p:column headerText="Display Name">
                        #{entityType.displayName}
                    </p:column>
                    
                    <p:column headerText="Name">
                        #{entityType.name}
                    </p:column>
                </p:dataTable>
                
            </p:outputPanel>
        </p:outputPanel>


        <f:facet name="footer">
            <p:commandButton value="save"
                             icon="pi pi-save"
                             update="entityTypeReorderPanel"
                             action="#{entityTypeController.saveNewSortOrder()}" />

            <p:commandButton value="close"
                             icon="pi pi-times"
                             action="#{entityTypeController.list()}" />
        </f:facet>                                        
    </p:dialog>


</ui:composition>
