<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:ui="http://java.sun.com/jsf/facelets"
                template="../../templates/contentViewTemplate.xhtml"
                xmlns:f="http://xmlns.jcp.org/jsf/core"
                xmlns:h="http://xmlns.jcp.org/jsf/html"
                xmlns:p="http://primefaces.org/ui">         
        
    <f:metadata>
        <f:viewAction action="#{settingController.updateGlobalSettings()}" />
        <f:viewAction action="#{entityTypeController.processPreRenderList()}"/>
    </f:metadata>
    
    <ui:param name="entityController" value="#{entityTypeController}"/>        
    <ui:param name="entityTypeName" value="#{entityController.entityTypeName}"/> 
    
    <ui:define name="pageTitle">: #{entityController.listPageTitle}</ui:define>    
    <ui:define name="middleCenter">

        <h:form id="viewEntityTypeForm"
                rendered="#{loginController.loggedInAsAdmin}"> 
            <div class="pageTitle">
                <h1>#{entityController.listPageTitle}</h1>
            </div>          
            
            <div class="actionButton">
                <p:commandButton icon="pi pi-plus"
                                 update="entityTypeCreatePanel" 
                                 action="#{entityController.prepareCreateTopLevelEntityType()}"
                                 oncomplete="PF('entityTypeCreateDialogWidget').show()"
                                 value="Add"/>
                
                <p:commandButton icon="pi pi-sort-alt"
                                 update="entityTypeReorderPanel" 
                                 action="#{entityController.prepareReorderTopLevelEntityTypes()}"
                                 oncomplete="PF('entityTypeReorderDialogWidget').show()"
                                 value="Reorder"/>
            </div>

            <h:panelGroup>  
                
                <p:treeTable id="entityTypeTreeTable"
                             value="#{entityTypeController.entityTypeTree}"
                             var="etTreeNode"
                             selectionMode="single"
                             selection="#{entityTypeController.selectedEntityType}"
                             > 
                    
                    <p:column headerText="Display Name">
                        #{etTreeNode.displayName}
                    </p:column>
                    
                    <p:column headerText="Long Display Name">
                        #{etTreeNode.longDisplayName}
                    </p:column>
                    
                    <p:column headerText="Name">
                        #{etTreeNode.name}
                    </p:column>
                    
                    <p:column headerText="Custom List">
                        #{etTreeNode.customListUrl}
                    </p:column>
                    
                    <p:column headerText="Template">
                        #{etTreeNode.primaryTemplateItem}
                    </p:column>
                    
                </p:treeTable>
                
                <p:contextMenu for="entityTypeTreeTable"
                               nodeType="parent">
                    <ui:include src="private/contextMenu/entityTypeCreateContextMenu.xhtml"/> 
                    <ui:include src="private/contextMenu/entityTypeInfoContextMenu.xhtml" />
                    <ui:include src="private/contextMenu/entityTypeEditContextMenu.xhtml" />
                    <ui:include src="private/contextMenu/entityTypeDestroyContextMenu.xhtml"/> 
                    <ui:include src="private/contextMenu/entityTypeReorderContextMenu.xhtml"/>
                </p:contextMenu>
                
                <p:contextMenu for="entityTypeTreeTable"
                               nodeType="child">
                    <ui:include src="private/contextMenu/entityTypeInfoContextMenu.xhtml" />                    
                    <ui:include src="private/contextMenu/entityTypeEditContextMenu.xhtml" />
                    <ui:include src="private/contextMenu/entityTypeDestroyContextMenu.xhtml"/> 
                </p:contextMenu>
                                
                <ui:include src="private/entityTypeInfoDialog.xhtml" /> 
                <ui:include src="private/entityTypeEditDialog.xhtml" /> 
                <ui:include src="private/entityTypeCreateDialog.xhtml" /> 
                <ui:include src="private/entityTypeReorderDialog.xhtml" />
                
                <ui:include src="../simpleEntity/private/simpleEntityDestroyDialog.xhtml" /> 
                          
            </h:panelGroup>

            <p/>                        
            
        </h:form>

    </ui:define>

    
</ui:composition>
