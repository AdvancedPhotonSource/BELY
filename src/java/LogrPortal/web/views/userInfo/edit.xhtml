<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="http://java.sun.com/jsf/html"
                xmlns:f="http://java.sun.com/jsf/core"
                xmlns:ui="http://java.sun.com/jsf/facelets"
                xmlns:p="http://primefaces.org/ui"
                template="../../templates/contentViewTemplate.xhtml">

    <f:metadata>
        <f:viewAction action="#{settingController.updateGlobalSettings()}" />
        <f:viewAction action="#{userInfoController.processEditRequestParams}"/>
    </f:metadata>

    <ui:define name="pageTitle">: Edit User #{userInfoController.selected.username}</ui:define>     
    <ui:define name="middleCenter">
        <h:form id="editUserInfoForm" rendered="#{loginController.loggedIn}">

            <div class="middleCenterLeftContent">
                <div class="pageTitle">
                    <h1>Edit User</h1>
                </div>

                <ui:include src="private/userInfoEditPanelGrid.xhtml"/>
                <p/>
                <ui:param name="entityController" value="#{userInfoController}"/>
                <ui:include src="../common/private/commonEditActionButtons.xhtml"/>
            </div>
            <div class="middleCenterRightContent">
                <p:accordionPanel multiple="true" activeIndex="1,2">
                    <p:tab title="Settings">

                        <ui:include src="../userSetting/private/userSettingEditList.xhtml"/>

                    </p:tab>

                    <p:tab title="Sessions">
                        <ui:param name="userInfoObject" value="#{userInfoController.selected}"/>
                        <ui:include src="private/userInfoSessionsDataTable.xhtml" /> 
                    </p:tab>

                    <p:tab title="Notification Configurations">
                        <ui:include src="../notificationConfiguration/private/notificationConfigurationListView.xhtml">
                            <ui:param name="userEntity"
                                      value="#{userInfoController.current}" />
                            <ui:param name="isEntityWriteable"
                                      value="#{true}" />
                        </ui:include>
                    </p:tab>

                    <p:tab rendered="#{loginController.loggedInAsAdmin}"
                           title="User Roles">
                        <ui:include src="../userRole/private/userInfoUserRoleEditList.xhtml"/>
                    </p:tab>
                </p:accordionPanel>
            </div>
        </h:form>

    </ui:define>
</ui:composition>
