<!DOCTYPE html
    PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<ui:composition xmlns="http://www.w3.org/1999/xhtml" 
                xmlns:ui="http://java.sun.com/jsf/facelets" 
                xmlns:f="http://java.sun.com/jsf/core"
                template="../templates/homeViewTemplate.xhtml"
                xmlns:p="http://primefaces.org/ui"
                xmlns:h="http://xmlns.jcp.org/jsf/html"
                xmlns:c="http://xmlns.jcp.org/jsp/jstl/core">

    <f:metadata>        
        <f:viewAction action="#{loginController.preRenderLogin()}" />
        <f:viewAction action="#{settingController.updateGlobalSettings()}" />
        <f:viewAction action="#{itemDomainLogbookController.processPreRenderLogbookHome()}"/> 
    </f:metadata>

    <ui:define name="middleCenter">        

        <h:form>
            <p:outputPanel rendered="#{loginController.loggedInAsAdmin}">
                <h1> Recent Log Documents 
                    <p:commandLink  id="editHomePage" 
                                    styleClass="fa fa-link-icon fa-pencil"
                                    update="editHomePageDialog"
                                    oncomplete="PF('editHomePageDialogWidget').show()"
                                    rendered="#{loginController.loggedIn}">
                        <p:tooltip for="editHomePage" value="Edit Recent Log Documents Home Page"/>
                    </p:commandLink>
                </h1>          
            </p:outputPanel>

            <ui:param name="homeObjectList"
                      value="#{itemDomainLogbookController.getLogbookHome(10)}" /> 

            <ui:param name="homeHasContents"
                      value="#{homeObjectList.size() > 0}"/>

            <p:panelGrid columns="#{homeObjectList.size()}" styleClass="homePageDataScroller"
                         rendered="#{homeHasContents}">

                <c:forEach items="#{homeObjectList}"
                           var="homeObject">        
                    <p:column>
                        <p:outputPanel>
                            <ui:param name="logbookType"
                                      value="#{homeObject.logbookType}"/> 
                            <ui:param name="logbookList"
                                      value="#{homeObject.logbookList}"/>
                            <h2>
                                <ui:param name="renderLink"
                                          value="#{logbookType.entityTypeChildren.size() == 0}" /> 

                                <h:outputLink rendered="#{renderLink}"
                                              value="itemDomainLogbook/#{logbookType.listUrl}"
                                              title="Navigate to operations list page.">
                                    #{logbookType.availableLongDisplayName}
                                </h:outputLink>
                                <h:outputText rendered="#{!renderLink}"
                                              value="#{logbookType.availableLongDisplayName}" /> 
                            </h2>

                            <p:dataScroller value="#{logbookList}" var="logItem" styleClass="logDataScroller">

                                <ui:include src="itemDomainLogbook/private/home/logDocumentDataScrollerObject.xhtml"/>

                            </p:dataScroller>
                        </p:outputPanel>                                        
                    </p:column>
                </c:forEach>
            </p:panelGrid>

            <p:outputPanel rendered="#{!homeHasContents}">
                No logbooks defined to show
            </p:outputPanel>


            <ui:include src="itemDomainLogbook/private/home/editHomepageDialog.xhtml"/> 
        </h:form>

    </ui:define>
</ui:composition>
