<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:ui="http://java.sun.com/jsf/facelets"
                xmlns:fn="http://java.sun.com/jsp/jstl/functions"
                xmlns:p="http://primefaces.org/ui"
                xmlns:f="http://xmlns.jcp.org/jsf/core"
                xmlns:c="http://xmlns.jcp.org/jsp/jstl/core">
    <p:outputPanel styleClass="mainMenuBar">
        <p:menubar>
            <p:submenu label="Logbook"
                       id="browseByDropdownButton"
                       icon="fa fa-list"
                       styleClass="wideSubMenu #{(fn:startsWith(view.viewId, '/views/itemDomainLogbook/')) ? 'activeSubMenuParentItem' : ''} ">               

                <c:forEach items="#{itemDomainLogbookController.topLevelEntityTypeList}"
                           var="et">

                    <c:if test="#{!et.hasChildren}">

                        <p:menuitem id="generatedLogbookMenuItem#{et.id}" 
                                    value="#{et.displayName}"
                                    icon="fa fa-book"
                                    url="#{request.contextPath}/views/itemDomainLogbook/#{et.listUrl}"
                                    styleClass="#{(fn:startsWith(view.viewId, '/views/itemDomainLogbook/')) ? 
                                                  (itemDomainLogbookController.isActivePage(et.id) ? 'activeMenuItem' : '') 
                                                  : ''}"                                    
                                    />

                    </c:if>

                    <c:if test="#{et.hasChildren}">
                        <p:submenu id="generatedLogbookSubMenuItem#{et.id}" 
                                   label="#{et.displayName}"
                                   icon="fa fa-list"
                                   styleClass="#{(fn:startsWith(view.viewId, '/views/itemDomainLogbook/')) ? 
                                                 (itemDomainLogbookController.isActiveParentPage(et.id) ? 'activeSubMenuParentItem' : '')
                                                 : ''}">
                            <c:forEach items="#{et.entityTypeChildren}"
                                       var="etChild">

                                <p:menuitem id="generatedLogbookMenuItem#{etChild.id}" 
                                            value="#{etChild.displayName}"
                                            icon="fa fa-book"
                                            url="#{request.contextPath}/views/itemDomainLogbook/#{etChild.listUrl}"
                                            styleClass="#{(fn:startsWith(view.viewId, '/views/itemDomainLogbook/')) ? 
                                                          (itemDomainLogbookController.isActivePage(etChild.id) ? 'activeMenuItem' : '') 
                                                          : ''}"/>                                
                            </c:forEach>                  
                        </p:submenu>
                    </c:if>                                        
                </c:forEach>              
            </p:submenu>

            <f:facet name="options">
                <p:menubar styleClass="menuBarSupportingItems"> 

                    <p:menuitem styleClass="noButtonMenuItem"
                                id="searchMenuItem">                                                                                                
                        <p:inputText id="menuBarSearchInput" placeholder="Quick Search"
                                     autocomplete="off"                                 
                                     styleClass="expandingInputText entityDataText menuBarInputText" 
                                     value="#{searchController.inputBoxSearchString}" 
                                     title="Search String"/>
                        <p:defaultCommand target="menuBarSearchInputCommand"
                                          scope="searchMenuItem"/>
                        <p:commandButton id="menuBarSearchInputCommand" 
                                         style="display: none" 
                                         update="@form" 
                                         action="#{searchController.performInputBoxSearch()}"/>                                                
                    </p:menuitem>
                    
                    <p:menuitem icon="pi pi-search"
                                value="Advanced Search"
                                update="@form"
                                styleClass="onlyIconMenuItem"
                                action="#{searchController.performInputBoxSearchAdvamced()}" />

                    <c:forEach items="#{cdbPluginManager.allMenuBarItems}" var="pluginMenuItem">
                        <c:if test="#{!pluginMenuItem.hasChildren}">
                            <p:menuitem value="#{pluginMenuItem.text}"
                                        icon="#{pluginMenuItem.icon}"
                                        url="#{pluginMenuItem.href}"
                                        target="_blank"/>
                        </c:if>
                        <c:if test="#{pluginMenuItem.hasChildren}">
                            <p:submenu label="#{pluginMenuItem.text}"
                                       icon="#{pluginMenuItem.icon}">
                                <c:forEach items="#{pluginMenuItem.children}" var="childItem">
                                    <p:menuitem value="#{childItem.text}"
                                                icon="#{childItem.icon}"
                                                url="#{childItem.href}"
                                                target="_blank"/>
                                </c:forEach>
                            </p:submenu>
                        </c:if>
                    </c:forEach>

                    <ui:include src="portalViewSupplementalMenubar.xhtml"/>                                           
                    <p:menuitem value="Login" id="loginButton" onclick="PF('loginDialogWidget').show()" rendered="#{!loginController.loggedIn}" icon="fa fa-sign-in"/>
                    <p:menuitem value="Logout" id="logoutButton" action="#{loginController.logout()}" rendered="#{loginController.loggedIn}" icon="fa fa-sign-out"/>
                    <p:menuitem value="About" url="#{request.contextPath}/views/about.xhtml" icon="fa fa-question"/>
                </p:menubar>
            </f:facet>
        </p:menubar>                

    </p:outputPanel>
</ui:composition>
