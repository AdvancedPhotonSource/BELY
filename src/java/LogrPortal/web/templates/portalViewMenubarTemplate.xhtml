<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:ui="http://java.sun.com/jsf/facelets"
                xmlns:fn="http://java.sun.com/jsp/jstl/functions"
                xmlns:p="http://primefaces.org/ui"
                xmlns:f="http://xmlns.jcp.org/jsf/core">
    <p:outputPanel styleClass="mainMenuBar">
        <p:menubar>              
            
            
            <p:submenu label="Logbook"
                       id="browseByDropdownButton"
                       icon="fa fa-book"
                       styleClass="wideSubMenu #{(fn:startsWith(view.viewId, '/views/itemDomainLogbook/')) ? 'activeSubMenuParentItem' : ''} ">
                <p:menuitem value="All" 
                        icon="fa fa-book"
                        rendered="false"
                        id="maarcMenubarButton" url="#{request.contextPath}/views/itemDomainLogbook/list" 
                        styleClass="#{fn:startsWith(view.viewId, '/views/itemDomainLogbook/') ? 'activeMenuItem' : ''} "/>
                
                <p:menuitem value="Machine Studies" 
                        icon="fa fa-book"                        
                        id="aopLogbookListButton" url="#{request.contextPath}/views/itemDomainLogbook/list?logbook=aop"                         
                        styleClass="#{fn:startsWith(view.viewId, '/views/itemDomainLogbook/list?logbook=aop') ? 'activeMenuItem' : ''} "/>
                
                <p:menuitem value="Controls" 
                        icon="fa fa-book"                        
                        id="ctlLogbookListButton" url="#{request.contextPath}/views/itemDomainLogbook/list?logbook=ctl"                         
                        styleClass="#{fn:startsWith(view.viewId, '/views/itemDomainLogbook/list?logbook=ctl') ? 'activeMenuItem' : ''} "/>
                
                <p:menuitem value="Operations" 
                        icon="fa fa-book"                        
                        id="opsLogbookListButton" url="#{request.contextPath}/views/itemDomainLogbook/list?logbook=ops" 
                        styleClass="#{fn:startsWith(view.viewId, '/views/itemDomainLogbook/list?logbook=ops') ? 'activeMenuItem' : ''} "/>
            </p:submenu>
            

            <f:facet name="options">
                <p:menubar styleClass="menuBarSupportingItems"> 
                    
                    <p:menuitem styleClass="noButtonMenuItem"
                                id="searchMenuItem">
                        <p:inputText id="menuBarSearchInput" placeholder="Search"
                                     autocomplete="off"                                 
                                     styleClass="expandingInputText entityDataText menuBarInputText" 
                                     value="#{searchController.inputBoxSearchString}" 
                                     title="Search String"/>
                        <p:defaultCommand target="menuBarSearchInputCommand"
                                          scope="searchMenuItem"/>
                        <p:commandButton id="menuBarSearchInputCommand" 
                                         style="display: none" 
                                         update="@form" 
                                         action="#{searchController.performInputBoxSearch()}"/>
                    </p:menuitem>

                    <ui:include src="portalViewSupplementalMenubar.xhtml"/>                       
                    <p:menuitem value="Settings"
                                action="#{userInfoController.prepareSessionUserEdit('/views/userInfo/edit')}" 
                                rendered="#{loginController.loggedIn}" icon="fa fa-cogs"/>
                    <p:menuitem value="Login" id="loginButton" onclick="PF('loginDialogWidget').show()" rendered="#{!loginController.loggedIn}" icon="fa fa-sign-in"/>
                    <p:menuitem value="Logout" id="logoutButton" action="#{loginController.logout()}" rendered="#{loginController.loggedIn}" icon="fa fa-sign-out"/>
                    <p:menuitem value="About" url="#{request.contextPath}/views/about.xhtml" icon="fa fa-question"/>
                </p:menubar>
            </f:facet>
        </p:menubar>
        
    </p:outputPanel>
</ui:composition>
