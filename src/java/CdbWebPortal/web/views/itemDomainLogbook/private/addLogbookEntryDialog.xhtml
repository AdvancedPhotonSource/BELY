<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:ui="http://java.sun.com/jsf/facelets"
                xmlns:p="http://primefaces.org/ui"
                xmlns:f="http://xmlns.jcp.org/jsf/core"
                xmlns:h="http://xmlns.jcp.org/jsf/html">

    <p:dialog id="#{entityTypeName}LogbookLogAddDialog"
              widgetVar="#{entityTypeName}LogbookLogAddDialogWidget" 
              header="Add Log Entry" 
              styleClass="viewTransparentBackgroundDialog"
              closable="false"
              modal="true">

        <ui:param name="logObject" value="#{entityController.newLogEdit}" />

        <p:panelGrid id="logEntryPanelGrid" columns="2" rendered="#{logObject != null}">

            <h:outputLabel for="logbookLogEntryValue" value="Log Entry" styleClass="entityDataEmphasizedLabel"/>
            <h:inputTextarea styleClass="logEntryDialogEntryValue" id="logbookLogEntryValue" value="#{logObject.text}"
                              onblur="logbookLogEntryValueBlur()"/>         

            <h:outputLabel for="logbookLogAttachmentsValue" value="Attachments" styleClass="entityDataEmphasizedLabel"/>
            <p:outputPanel id="logbookLogAttachmentsValue">
                <ui:include src="../../log/private/logAttachmentFileUpload.xhtml">
                    <ui:param name="updateTarget" value="logEntryPanelGrid" />
                </ui:include>
                <p:remoteCommand autoRun="true"
                                 action="#{logAttachmentUploadBean.setLogEntry(logObject)}"/>
                <p:outputPanel id="logattachementsValueList">
                    <ui:repeat var="attachment" value="#{logObject.attachmentList}">
                        <h:outputLink value="#{attachment.filePath}" target="_page_#{attachment.name}" title="#{attachment.name}" styleClass="entityDataIcon">
                            <h:graphicImage alt="Attachment" library="images" name="attachment.ico"/>
                        </h:outputLink>   
                    </ui:repeat>
                </p:outputPanel>
            </p:outputPanel>


        </p:panelGrid>
        
        <p:remoteCommand name="logbookLogEntryValueBlur" 
                         update="logbookLogEntryValue"/> 
        <f:facet name="footer" class="dialog">
            <p:outputPanel rendered="#{logObject != null}">
                <p:commandButton value="Save" alt="Save" 
                                 id="#{entityTypeName}SaveLogbookLogButton"
                                 action="#{entityController.saveLogList()}"
                                 actionListener="#{logController.saveLogEntry(logObject)}"
                                 update="@form"
                                 oncomplete="PF('#{entityTypeName}LogAddDialogWidget').hide()"
                                 icon="fa fa-save"/>

                <p:commandButton value="Close" 
                                 icon="fa fa-close"
                                 oncomplete="PF('#{entityTypeName}LogAddDialogWidget').hide()"
                                 action="#{entityController.viewForCurrentEntity()}"
                                 update="@form"
                                 />
            </p:outputPanel>
        </f:facet>

    </p:dialog>



</ui:composition>
